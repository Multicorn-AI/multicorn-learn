# ──────────────────────────────────────────────────────────────────────────────
# multicorn-learn — Continuous Integration
# ──────────────────────────────────────────────────────────────────────────────
# Runs on every push / PR targeting main.
# Pipeline: checkout → pnpm install → lint → type check → build (next build)
#
# Deployment is handled by Vercel's GitHub integration:
#   • Push to main  → automatic production deploy
#   • Pull requests  → automatic preview deploy with unique URL
# No GitHub Actions deploy step is needed — Vercel watches the repo directly.
# ──────────────────────────────────────────────────────────────────────────────
name: CI — multicorn-learn

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch/PR to save minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

  # ── Type Check ────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type check
        run: pnpm typecheck

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js site
        run: pnpm build

      - name: Summary
        run: |
          echo "### ✅ multicorn-learn CI passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Lint** | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| **Type Check** | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build** | ✅ Passed |" >> $GITHUB_STEP_SUMMARY

  # ── Security Audit ────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --prod --audit-level=high
